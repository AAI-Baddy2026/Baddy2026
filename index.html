
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAI Badminton Tournament 2026 — Scheduler</title>
<style>
/* ============================================================================
   THEME TOKENS  — single source of truth for colours / spacing
   ========================================================================== */
:root{
  --navy:#1F4E78; --navy-d:#163759; --blue:#2E75B6; --sky:#0369A1;
  --bg:#eef1f6; --card:#ffffff; --line:#e4e8ee; --ink:#1f2937; --muted:#6b7280;
  --ok:#16a34a; --ok-bg:#ecfdf5; --warn:#c2410c; --amber:#f59e0b; --amber-bg:#fffbeb;
  --danger:#ef4444; --danger-d:#dc2626; --vacant:#f59e0b; --vacant-bg:#fff7ed;
  --chip:#eff6ff; --chip-br:#bfdbfe; --radius:10px; --shadow:0 1px 3px rgba(16,24,40,.08);
  --shadow-lg:0 8px 30px rgba(16,24,40,.16);
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
  background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%;}
#app{max-width:1400px;margin:0 auto;padding:0 16px 80px}

/* -------- Top bar -------- */
.topbar{position:sticky;top:0;z-index:40;display:flex;justify-content:space-between;align-items:center;
  gap:12px;padding:12px 20px;background:#fff;border-bottom:1px solid var(--line);
  margin:0 -16px 0;box-shadow:var(--shadow);flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--navy),var(--blue));
  color:#fff;display:grid;place-items:center;font-weight:800;font-size:15px;flex:none}
.brand h1{font-size:17px;margin:0;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .sub{font-size:11px;color:var(--muted);margin-top:1px}
.topactions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* mode pill */
.modepill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;
  font-size:12px;font-weight:700;border:1px solid transparent}
.modepill.viewer{background:#eef2ff;color:#3730a3;border-color:#c7d2fe}
.modepill.admin{background:var(--amber-bg);color:#92400e;border-color:#fcd34d}

/* -------- Buttons -------- */
.btn{padding:8px 14px;border:1px solid #d1d5db;background:#fff;border-radius:8px;cursor:pointer;
  font-size:13px;font-family:inherit;font-weight:600;color:#374151;transition:.12s;white-space:nowrap}
.btn:hover{background:#f3f4f6}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:var(--navy-d)}
.btn-success{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-success:hover{filter:brightness(.95)}
.btn-warn{background:var(--amber);color:#fff;border-color:var(--amber)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:var(--danger-d)}
.btn-refresh{background:var(--sky);color:#fff;border-color:var(--sky)}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--navy)}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* -------- Tabs -------- */
.tabs{display:flex;gap:6px;margin:18px 0;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tab{padding:9px 16px;background:#fff;border:1px solid #d6dbe2;border-radius:8px;cursor:pointer;
  font-size:13px;color:#374151;font-weight:600;white-space:nowrap;flex:none}
.tab:hover{background:#f3f4f6}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:var(--shadow)}

/* -------- Panels -------- */
.panel{background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);border:1px solid var(--line)}
.panel h2{margin:0 0 4px;color:var(--navy);font-size:19px}
.panel h3{color:var(--navy);font-size:15px;margin:26px 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.muted{color:var(--muted);font-size:13px;line-height:1.5}
.notice{border-radius:8px;padding:11px 14px;margin:12px 0;font-size:13px;line-height:1.5}
.notice-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.notice-amber{background:var(--amber-bg);border:1px solid #fcd34d;color:#92400e}

/* -------- Tables -------- */
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px}
.table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;min-width:480px}
.table th{background:var(--navy);color:#fff;padding:9px 11px;text-align:left;font-weight:600;position:sticky;top:0}
.table td{padding:8px 11px;border-bottom:1px solid var(--line);vertical-align:middle}
.table tr:nth-child(even) td{background:#f8fafc}
.table tr.pending td{background:var(--amber-bg)}
.table tr.done td{background:var(--ok-bg)}
.ok{color:var(--ok);font-weight:700}.warn{color:var(--warn);font-weight:700}
.winner{background:#c6efce !important;font-weight:700}
.bye{color:#9ca3af;font-style:italic}

/* -------- Forms -------- */
.addform{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 18px;padding:14px;background:#f8fafc;border:1px solid var(--line);border-radius:10px;align-items:center}
.addform input,.addform select,.fld{padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-family:inherit;background:#fff}
.settings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:16px 0}
.settings-grid label{display:flex;flex-direction:column;gap:5px;font-size:12px;color:#374151;font-weight:700}
.settings-grid input{padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px}

/* -------- Category cards / pairings -------- */
.cat-block{border:1px solid var(--line);border-radius:12px;padding:16px;margin:16px 0;background:#fcfdff}
.cat-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.cat-title{font-size:15px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:9px}
.cat-title .dot{width:10px;height:10px;border-radius:3px;background:var(--blue)}
.count-badge{font-size:11px;font-weight:700;color:var(--muted);background:#eef2f7;border:1px solid var(--line);padding:2px 9px;border-radius:999px}

.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;margin-top:10px}
.team-card{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;
  padding:9px 11px;background:#fff;box-shadow:var(--shadow)}
.team-no{flex:none;width:26px;height:26px;border-radius:7px;background:var(--navy);color:#fff;
  font-size:12px;font-weight:700;display:grid;place-items:center}
.slots{display:flex;align-items:center;gap:7px;flex:1;min-width:0;flex-wrap:wrap}
.vs{color:var(--muted);font-size:11px;font-weight:700}

/* a player chip inside a slot */
.slot{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;font-size:13px;
  font-weight:600;min-width:96px}
.slot.filled{background:var(--chip);border:1px solid var(--chip-br);color:#1e3a8a}
.slot.vacant{background:var(--vacant-bg);border:1.5px dashed var(--vacant);color:#b45309;cursor:default;
  justify-content:center;font-style:italic}
.slot.vacant.droptarget,.slot.filled.droptarget{outline:3px solid rgba(31,78,120,.35);outline-offset:1px;background:#dbeafe}
.slot .x{cursor:pointer;color:#b45309;font-weight:800;border-radius:4px;padding:0 3px}
.slot .x:hover{background:rgba(180,83,9,.15)}
.admin .slot.vacant{cursor:pointer}
.admin .slot.vacant:hover{background:#ffedd5}

/* draggable player chips (unpaired list + movable slot chips) */
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;font-size:13px;
  font-weight:600;background:var(--chip);border:1px solid var(--chip-br);color:#1e3a8a}
.admin .chip.drag{cursor:grab}
.admin .chip.drag:active{cursor:grabbing}
.chip.drag .grip{color:#93a8cf;font-weight:800;letter-spacing:-2px}
.chip.dragging{opacity:.4}
.chip .g{font-size:10px;color:#64748b;font-weight:700}

.unpaired{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
.unpaired h4{margin:0 0 8px;font-size:12.5px;color:var(--warn);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.unpaired .pool{display:flex;flex-wrap:wrap;gap:7px;min-height:42px;padding:10px;border:1.5px dashed var(--line);
  border-radius:10px;background:#fff;transition:.12s}
.unpaired .pool.droptarget{border-color:var(--navy);background:#eff6ff}
.unpaired .empty{color:var(--muted);font-size:12.5px;font-style:italic;padding:4px}

/* -------- Brackets -------- */
.subtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.subtab{padding:7px 14px;background:#eef2f7;border:1px solid #d6dbe2;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600}
.subtab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.bracket-wrap{display:flex;gap:30px;overflow-x:auto;padding:12px 0 22px}
.bracket-col{display:flex;flex-direction:column;gap:10px;min-width:210px}
.bracket-stage{font-weight:700;color:#fff;background:var(--blue);padding:6px 12px;border-radius:7px;text-align:center;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
.match-card{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12.5px;box-shadow:var(--shadow)}
.match-id{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700}
.match-side{padding:4px 0;border-top:1px dashed var(--line)}
.match-side:first-of-type{border-top:none}
.match-side.winner{background:#c6efce;padding:4px 7px;border-radius:4px}

/* -------- Stats / filters -------- */
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
.stat-card{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:9px 15px;min-width:130px}
.stat-label{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.stat-nums{font-size:14px;margin-top:3px}
.stat-played{color:var(--ok);font-weight:800}.stat-remaining{color:var(--warn);font-weight:800}.stat-total{color:var(--muted)}
.filterbar{display:flex;gap:16px;margin:12px 0;align-items:flex-end;flex-wrap:wrap}
.filterbar label{display:flex;flex-direction:column;gap:5px;font-size:12px;font-weight:700}
.filterbar select{padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px}
.actionbar{display:flex;gap:10px;margin:14px 0;align-items:center;flex-wrap:wrap}
.badge{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700}
.badge-success{background:#c6efce;color:#166534}
.resbtns{display:flex;gap:5px}

/* -------- Modal / toast -------- */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:grid;place-items:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);max-width:440px;width:100%;padding:22px;animation:pop .14s ease}
@keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{margin:0 0 6px;color:var(--navy);font-size:18px}
.modal .row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap}
.modal input[type=text],.modal input[type=password]{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-top:6px}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.checks label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;padding:8px 10px;border:1px solid var(--line);border-radius:8px;cursor:pointer}
.checks label.dis{opacity:.4;cursor:not-allowed}
.pick-pool{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;max-height:280px;overflow:auto}
.pick-pool .chip{cursor:pointer}
.pick-pool .chip:hover{background:#dbeafe}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111827;color:#fff;
  padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;z-index:200;box-shadow:var(--shadow-lg);opacity:0;transition:.2s}
.toast.show{opacity:1}
.toast.warn{background:#b45309}.toast.ok{background:#15803d}

/* -------- Responsive -------- */
@media (max-width:720px){
  #app{padding:0 10px 70px}
  .topbar{padding:10px 12px}
  .brand h1{font-size:15px;max-width:54vw}
  .settings-grid{grid-template-columns:1fr}
  .team-grid{grid-template-columns:1fr}
  .checks{grid-template-columns:1fr}
  .panel{padding:15px}
}
</style>

  while(prev.length>1){const cur=[];
    for(let j=0;j<prev.length;j+=2)cur.push({match_id:`${catCode}-R${rnd}-${j/2+1}`,cat:catCode,round:rnd,
      side_a:{winner_of:prev[j].match_id},side_b:{winner_of:prev[j+1].match_id}});
    rounds.push(cur);prev=cur;rnd++;}
  return rounds;
}
/* player ids that could appear in a match (null vacancies skipped) */
function matchPlayers(match,matchById,pairings){
  const ids=new Set();
  for(const side of [match.side_a,match.side_b]){
    if(!side)continue;
    if(side.type==="entrant"){ const t=pairings[match.cat][side.idx]||[]; for(const pid of t) if(pid!=null) ids.add(pid); }
    else if(side.winner_of){ const dep=matchById[side.winner_of]; if(dep) for(const pid of matchPlayers(dep,matchById,pairings)) ids.add(pid); }
  }
  return ids;
}
function generateBracketsAndSchedule(){
  const pairings=window.STATE.pairings,allMatches=[],matchById={},catMaxRound={};
  for(const c of CAT_ORDER){ const ents=pairings[c]||[];
    if(ents.length<2){catMaxRound[c]=0;continue;}
    const rounds=buildBracket(ents,c);
    for(const rnd of rounds)for(const m of rnd){allMatches.push(m);matchById[m.match_id]=m;}
    catMaxRound[c]=rounds.length;
  }
  for(const m of allMatches){
    const fromEnd=catMaxRound[m.cat]-m.round;
    if(fromEnd<=2){m.phase="KNOCKOUT";m.duration=window.STATE.settings.knockoutDuration;
      m.stage=fromEnd===0?"Final":(fromEnd===1?"Semifinal":"Quarterfinal");}
    else{m.phase="QUALIFIER";m.duration=window.STATE.settings.qualifierDuration;m.stage=`R${m.round}`;}
  }
  /* auto-resolve BYE matches */
  const autoWin={},ordered=[...allMatches].sort((a,b)=>a.round-b.round);
  for(const m of ordered){
    const resolve=side=>side.type==="bye"?"BYE":side.type==="entrant"?"ENT":(side.winner_of?(autoWin[side.winner_of]||"PENDING"):"PENDING");
    const ra=resolve(m.side_a),rb=resolve(m.side_b);
    if(ra==="BYE"&&rb==="BYE")autoWin[m.match_id]="BYE";
    else if(ra==="BYE"&&rb==="ENT")autoWin[m.match_id]="B";
    else if(rb==="BYE"&&ra==="ENT")autoWin[m.match_id]="A";
  }
  /* ---- schedule packing (per-court free-interval list) ---- */
  const blocks=window.STATE.settings.blocks,courts={};
  for(const b of blocks)for(let c=1;c<=b.courts;c++)courts[`${b.date}|${c}|${b.label}`]={free:[[b.startMin,b.endMin]]};
  const depsOf={};
  for(const m of allMatches){const ds=[];if(m.side_a&&m.side_a.winner_of)ds.push(m.side_a.winner_of);if(m.side_b&&m.side_b.winner_of)ds.push(m.side_b.winner_of);depsOf[m.match_id]=ds;}
  const priority={MS:0,WS:0,XD:0,MD:1,WD:1};
  const sorted=[...allMatches].filter(m=>!autoWin[m.match_id]).sort((a,b)=>{
    const pa=a.phase==="QUALIFIER"?0:1,pb=b.phase==="QUALIFIER"?0:1; if(pa!==pb)return pa-pb;
    if(a.round!==b.round)return a.round-b.round;
    const ca=priority[a.cat]??9,cb=priority[b.cat]??9; if(ca!==cb)return ca-cb;
    return a.match_id.localeCompare(b.match_id);});
  const schedById={},playerBusy={};
  function findSlot(iv,dur,earliest){for(let i=0;i<iv.length;i++){const[s,e]=iv[i];const st=Math.max(s,earliest);if(st+dur<=e)return{i,start:st};}return null;}
  function bookSlot(iv,i,start,end){const[s,e]=iv[i];iv.splice(i,1);let idx=i;if(s<start){iv.splice(idx,0,[s,start]);idx++;}if(end<e)iv.splice(idx,0,[end,e]);}
  let changed=true,iter=0;
  while(changed&&iter<30){changed=false;iter++;
    for(const m of sorted){
      if(schedById[m.match_id])continue;
      let depOk=true; for(const d of depsOf[m.match_id]){if(schedById[d])continue;if(autoWin[d])continue;depOk=false;break;} if(!depOk)continue;
      const pids=matchPlayers(m,matchById,pairings); let best=null;
      for(const b of blocks){ if(b.phase!==m.phase)continue;
        let earliest=b.startMin; for(const d of depsOf[m.match_id]){const ds=schedById[d];if(ds&&ds.date===b.date)earliest=Math.max(earliest,ds.endMin);}
        for(let c=1;c<=b.courts;c++){ const ci=courts[`${b.date}|${c}|${b.label}`]; if(!ci)continue;
          const slot=findSlot(ci.free,m.duration,earliest); if(!slot)continue;
          const start=slot.start,end=start+m.duration; let overlap=false;
          for(const pid of pids){const busy=playerBusy[pid]||[];for(const bb of busy){if(bb.date===b.date&&!(end<=bb.s||start>=bb.e)){overlap=true;break;}}if(overlap)break;}
          if(overlap)continue;
          const key=[b.date,start];
          if(!best||key[0]<best.key[0]||(key[0]===best.key[0]&&key[1]<best.key[1])) best={key,b,c,ci,slotIdx:slot.i,start,end};
        }
      }
      if(best){ bookSlot(best.ci.free,best.slotIdx,best.start,best.end);
        schedById[m.match_id]={match_id:m.match_id,date:best.b.date,court:best.c,startMin:best.start,endMin:best.end,block:best.b.label,stage:m.stage,cat:m.cat,phase:m.phase,duration:m.duration};
        for(const pid of pids)(playerBusy[pid]=playerBusy[pid]||[]).push({date:best.b.date,s:best.start,e:best.end});
        changed=true;
      }
    }
  }
  window.STATE.matches=allMatches;
  window.STATE.scheduled=Object.values(schedById);
  window.STATE.unscheduled=allMatches.filter(m=>!autoWin[m.match_id]&&!schedById[m.match_id]).map(m=>({match_id:m.match_id,cat:m.cat,round:m.round,stage:m.stage}));
  window.STATE.autoWin=autoWin;
  saveState();
}

/* ---------------- Side-label resolution ----------------------------------- */
function entrantLabel(cat,idx){const t=window.STATE.pairings[cat][idx];if(!t)return"?";return t.map(pname).join(" / ");}
function sideLabelFor(cat,side){
  if(!side)return"—";
  if(side.type==="entrant")return entrantLabel(cat,side.idx);
  if(side.type==="bye")return"BYE";
  if(side.winner_of){const w=effectiveWinner(side.winner_of);
    if(w==="PENDING")return`Winner of ${side.winner_of}`; if(w==="BYE")return"BYE";
    const dep=window.STATE.matches.find(x=>x.match_id===side.winner_of); if(!dep)return"?";
    return w==="A"?sideLabelFor(cat,dep.side_a):sideLabelFor(cat,dep.side_b);}
  return"?";
}
function effectiveWinner(matchId){
  if(window.STATE.results[matchId])return window.STATE.results[matchId];
  if(window.STATE.autoWin&&window.STATE.autoWin[matchId])return window.STATE.autoWin[matchId];
  return"PENDING";
}
function matchPlayersForResult(match,side){
  const ids=new Set();
  if(side.type==="entrant"){ (window.STATE.pairings[match.cat][side.idx]||[]).forEach(pid=>{if(pid!=null)ids.add(pid);}); }
  else if(side.winner_of){ const w=effectiveWinner(side.winner_of),dep=window.STATE.matches.find(x=>x.match_id===side.winner_of);
    if(dep&&(w==="A"||w==="B")){const ds=w==="A"?dep.side_a:dep.side_b;matchPlayersForResult(dep,ds).forEach(pid=>ids.add(pid));}}
  return ids;
}

/* =========================================================================
   MUTATIONS  (Requirements 1, 2, 3) — every one ends by regenerating the
   bracket + schedule and re-rendering, so the UI updates instantly.
   ========================================================================= */
function afterChange(msg,type){ generateBracketsAndSchedule(); saveState(); render(); if(msg) toast(msg,type); }

/* Detach a player from ONE category's pairings:
   - doubles  → leave the slot VACANT (null) and KEEP the team + partner;
                drop the team only if it becomes completely empty.
   - singles  → remove that draw entrant. */
function detachFromCat(pid,cat){
  const teams=window.STATE.pairings[cat]||[];
  for(let i=teams.length-1;i>=0;i--){
    const t=teams[i],idx=t.indexOf(pid); if(idx===-1)continue;
    if(SINGLES[cat]) teams.splice(i,1);
    else{ t[idx]=null; window._recentFills.delete(`${cat}:${i}:${idx}`); if(t.every(x=>x==null)) teams.splice(i,1); }
  }
}
/* Requirement 2 — remove a player from the whole tournament. */
function removePlayer(pid){
  const p=pById(pid); if(!p)return;
  if(!confirm(`Remove ${p.name} from the tournament?\n\nThey will be taken out of every category. In any doubles pair their slot is left VACANT (the partner stays and the slot can be re-filled).`))return;
  for(const c of CAT_ORDER) detachFromCat(pid,c);
  window.STATE.players=window.STATE.players.filter(x=>x.id!==pid);
  afterChange(`${p.name} removed — doubles slots left vacant for re-assignment`,"ok");
}
/* Requirement 1 — update a player's categories (and name/gender).
   Existing valid pairings are preserved; only DROPPED categories detach. */
function applyPlayerEdit(pid,name,gender,newCats){
  const p=pById(pid); if(!p)return;
  const oldCats=new Set(p.cats||[]); const nw=new Set(newCats);
  p.name=name.trim()||p.name; p.gender=gender; p.cats=[...nw];
  for(const c of oldCats) if(!nw.has(c)) detachFromCat(pid,c);          // dropped categories
  for(const c of [...nw]) if(GENDER_OK[c]&&p.gender!==GENDER_OK[c]){    // gender now inconsistent
      detachFromCat(pid,c); p.cats=p.cats.filter(x=>x!==c); }
  afterChange(`${p.name} updated — pairings reconciled`,"ok");
}
function addPlayer(name,gender,cats,pref){
  window.STATE.players.push({id:nextPlayerId(),name:name.trim(),gender,cats,partner_pref:pref||null});
  afterChange(`${name} added — now available in their categories' Unpaired lists`,"ok");
}

/* Requirement 3 — assign / vacate / swap slots ------------------------------ */
function assignToSlot(cat,ti,slot,pid){
  if(!isAdmin())return;
  const team=window.STATE.pairings[cat][ti]; if(!team)return;
  if(!isEligible(pid,cat)){ toast(`${pname(pid)} is not nominated for ${CAT_LABEL[cat]}`,"warn"); return; }
  // already in this category somewhere?
  for(const t of window.STATE.pairings[cat]) if(t.indexOf(pid)!==-1){ toast(`${pname(pid)} is already placed in ${CAT_LABEL[cat]}`,"warn"); return; }
  if(cat==="XD"){ const other=team[1-slot];
    if(other!=null && pById(other).gender===pById(pid).gender){ toast("Mixed Doubles needs one male and one female","warn"); return; } }
  team[slot]=pid; window._recentFills.add(`${cat}:${ti}:${slot}`);
  afterChange(`${pname(pid)} assigned to ${CAT_LABEL[cat]} team ${ti+1}`,"ok");
}
function vacateSlot(cat,ti,slot){
  if(!isAdmin())return;
  const team=window.STATE.pairings[cat][ti]; if(!team)return;
  const was=team[slot]; team[slot]=null; window._recentFills.delete(`${cat}:${ti}:${slot}`);
  if(team.every(x=>x==null)) window.STATE.pairings[cat].splice(ti,1);  // drop empty team
  afterChange(`${pname(was)} returned to Unpaired`,"ok");
}
function addEmptyTeam(cat){
  if(!isAdmin())return;
  window.STATE.pairings[cat].push(DOUBLES[cat]?[null,null]:[null]);
  afterChange(`Added an empty ${CAT_LABEL[cat]} slot`,"ok");
}
/* swap two existing players (only meaningful while UNLOCKED) */
function swapSlots(cat,aTi,aSlot,bTi,bSlot){
  const arr=window.STATE.pairings[cat]; const tmp=arr[aTi][aSlot]; arr[aTi][aSlot]=arr[bTi][bSlot]; arr[bTi][bSlot]=tmp;
  afterChange("Players swapped","ok");
}
/* add an eligible singles player as a new draw entrant */
function addSinglesEntrant(cat,pid){
  if(!isAdmin())return; if(!isEligible(pid,cat))return;
  window.STATE.pairings[cat].push([pid]); afterChange(`${pname(pid)} added to the ${CAT_LABEL[cat]} draw`,"ok");
}

const $=sel=>document.querySelector(sel);
function el(tag,attrs={},...children){
  const n=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(v==null||v===false)continue;
    if(k==="class")n.className=v; else if(k.startsWith("on"))n.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="html")n.innerHTML=v; else n.setAttribute(k,v);
  }
  for(const c of children.flat()){ if(c==null||c===false)continue;
    n.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c); }
  return n;
}
function toast(msg,type){
  let t=$("#toast"); if(!t){t=el("div",{id:"toast",class:"toast"});document.body.appendChild(t);}
  t.className="toast "+(type||""); t.textContent=msg; requestAnimationFrame(()=>t.classList.add("show"));
  clearTimeout(window._toastT); window._toastT=setTimeout(()=>t.classList.remove("show"),2600);
}

/* a single slot inside a team (filled chip OR vacant drop-zone) */

/* drag payload helpers */
function setData(e,obj){ e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain",JSON.stringify(obj)); }

function onDropToSlot(e,cat,ti,slot){
  const d=safeData(e); if(!d||d.cat!==cat)return;
  if(d.src==="unpaired") assignToSlot(cat,ti,slot,d.pid);
  else if(d.src==="slot"){
    if(d.ti===ti&&d.slot===slot)return;
    const target=window.STATE.pairings[cat][ti][slot];
    if(target==null){ // moving into a vacant slot = relocate
      window.STATE.pairings[cat][ti][slot]=d.pid; window.STATE.pairings[cat][d.ti][d.slot]=null;
      window._recentFills.add(`${cat}:${ti}:${slot}`);

    else toast("Finalised teams can't be swapped — only vacant slots can be filled","warn");
  }
}

  const lr=[["Rank","Player","Gender","Categories","Wins"]];lb.forEach((r,i)=>lr.push([i+1,r.name,r.gender,r.cats,r.wins]));
  const wsL=XLSX.utils.aoa_to_sheet(lr);wsL["!cols"]=[{wch:6},{wch:24},{wch:8},{wch:30},{wch:6}];XLSX.utils.book_append_sheet(wb,wsL,"Leaderboard");
  XLSX.writeFile(wb,"Tournament_Schedule_"+new Date().toISOString().slice(0,10)+".xlsx");
  toast("Excel exported","ok");
}
/* Requirement 6 — produce a self-contained, read-only shareable copy.
   It bakes the CURRENT state into SEED_STATE and sets FORCE_SEED so the
   recipient always sees this published snapshot, opens read-only, and has
   no admin data. (They could still log in with the password, by design.) */
function exportShareableHTML(){
  if(!isAdmin())return;
  const ts=new Date().toLocaleString();
  let html="<!DOCTYPE html>\n"+document.documentElement.outerHTML;
  const baked="/*SEED_STATE_START*/\nwindow.SEED_PLAYERS = "+JSON.stringify(window.STATE.players)+";\n"+
    "window.SEED_STATE = "+JSON.stringify(window.STATE)+";\n"+
    "window.FORCE_SEED = true; window.SNAPSHOT_AT = "+JSON.stringify(ts)+";\n/*SEED_STATE_END*/";
  html=html.replace(/\/\*SEED_STATE_START\*\/[\s\S]*?\/\*SEED_STATE_END\*\//,()=>baked);
  const blob=new Blob([html],{type:"text/html"}),url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download="AAI_Tournament_View_"+new Date().toISOString().slice(0,10)+".html";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast("View-only copy downloaded — share this file","ok");
}
function exportJSON(){ if(!isAdmin())return;
  const blob=new Blob([JSON.stringify(window.STATE,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download="tournament_state_"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}
function importJSON(){ if(!isAdmin())return;
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const o=JSON.parse(r.result);if(!o.players)throw new Error("missing players");window.STATE=migrate(o);window._recentFills.clear();saveState();render();toast("State imported","ok");}catch(e){toast("Invalid file: "+e.message,"warn");}};
    r.readAsText(f);};
  inp.click();
}

/* =========================================================================
   BOOT
   ========================================================================= */
window.STATE=loadState();
(function boot(){
  const hasPairings=Object.values(window.STATE.pairings||{}).some(a=>a&&a.length);
  if(hasPairings && !window.STATE.matches.length){
    generateBracketsAndSchedule();              // seeded pairings, no bracket yet -> build it
  }else if(!hasPairings && window.STATE.players.length){
    window.STATE.pairings=generatePairings();   // nothing set -> generate a fresh draw
    generateBracketsAndSchedule(); saveState();
  }
})();
document.addEventListener("DOMContentLoaded",render);
if(document.readyState!=="loading") render();
</script>
